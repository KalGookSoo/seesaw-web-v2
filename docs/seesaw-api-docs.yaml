          description: 최종 수정자 계정명
          example: editor
        lastModifiedIp:
          type: string
          description: 최종 수정 IP
          example: 192.168.0.11
        lastModifiedDate:
          type: string
          description: 최종 수정 일시
          format: date-time
        referenceId:
          type: string
          description: 참조 식별자
          example: 8f14e45f-ea9d-4b1c-a3a4-12c4b2a9c001
