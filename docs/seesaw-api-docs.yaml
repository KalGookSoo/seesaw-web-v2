    UpdateEventRequest:
      required:
      - dtEnd
      - dtStart
      - title
      type: object
      properties:
        dtStart:
          type: string
          description: 시작 일시
          format: date-time
        dtEnd:
          type: string
          description: 종료 일시
          format: date-time
        title:
          type: string
          description: 제목
        content:
          type: string
          description: 상세 설명
        location:
          type: string
          description: 장소
        status:
          type: string
          description: 상태
          enum:
          - TENTATIVE
          - CONFIRMED
          - CANCELLED
        tzid:
          type: string
          description: 시간대 식별자
        categoryId:
          type: string
          description: 카테고리 ID
        multipartFiles:
          type: array
          description: 첨부파일
          items:
            type: string
            format: binary
        inlineImages:
          type: array
          description: 이미지
          items:
            type: string
            format: binary
        multipartFilesSizeValid:
          type: boolean
        inlineImagesSizeValid:
          type: boolean
      description: 일정 수정 커맨드
    ArticleResponse:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: 식별자(UUID)
          example: 8f14e45f-ea9d-4b1c-a3a4-12c4b2a9c001
        createdBy:
          type: string
          description: 생성자 계정명
          example: admin
        createdIp:
          type: string
          description: 생성 IP
          example: 192.168.0.10
        createdDate:
          type: string
          description: 생성 일시
          format: date-time
        lastModifiedBy:
          type: string
          description: 최종 수정자 계정명
          example: editor
        lastModifiedIp:
          type: string
          description: 최종 수정 IP
          example: 192.168.0.11
        lastModifiedDate:
          type: string
          description: 최종 수정 일시
          format: date-time
        parentId:
          type: string
          description: 부모 식별자
          example: c1e2d3f4-0000-0000-0000-000000000001
