          type: string
        createdIp:
          type: string
        createdDate:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
        lastModifiedIp:
          type: string
        lastModifiedDate:
          type: string
          format: date-time
        version:
          type: integer
          format: int32
