          $ref: "#/components/schemas/ArticleResponse"
        children:
          type: array
          description: 자식 모델 목록
          readOnly: true
          items:
            $ref: "#/components/schemas/ArticleResponse"
        exposed:
          type: boolean
        fixed:
          type: boolean
        fixedOrder:
          type: integer
          format: int32
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum:
          - MAP
          - HTML
          - CAROUSEL
          - BUTTON_GROUP
          - IMAGE
          - TABLE
          - VIDEO
        categoryId:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentResponse"
        replies:
          type: array
          items:
            $ref: "#/components/schemas/ReplyResponse"
        views:
          type: array
          items:
            $ref: "#/components/schemas/ViewResponse"
        votes:
          type: array
          items:
            $ref: "#/components/schemas/VoteResponse"
        url:
          type: string
        inlineImages:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentResponse"
